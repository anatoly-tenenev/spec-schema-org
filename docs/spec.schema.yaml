version: 0.0.5
entity:
  domain:
    idPrefix: DOM
    pathTemplate: "spec/domains/${slug}/index.md"
    content:
      sections:
        goal:
          title: Goal

  service:
    idPrefix: SVC
    pathTemplate: "${refs.domain.dirPath}/services/${slug}/index.md"
    meta:
      fields:
        domain:
          schema:
            type: entityRef
            refTypes: [domain]
        tier:
          schema:
            type: string
            enum: [gold, silver, bronze]

  feature:
    idPrefix: FEAT
    pathTemplate:
      cases:
        - when: ${refs.service}
          use: "${refs.service.dirPath}/features/${meta.status}/${slug}.md"
        - use: "spec/features/${meta.status}/${slug}.md"
    meta:
      fields:
        service:
          required: false
          schema:
            type: entityRef
            refTypes: [service]
        owner:
          schema:
            type: string
        status:
          schema:
            type: string
            enum: [draft, testing, actual, deprecated]
        priority:
          schema:
            type: string
            enum: [p0, p1, p2]
        linked_epic:
          required: false
          schema:
            type: entityRef
            refTypes: [feature]
        test_file:
          required: ${meta.status == 'testing' || meta.status == 'actual'}
          schema:
            type: string
    content:
      sections:
        goal:
          title: Goal
        scope:
          title: Scope
        acceptance:
          title: Acceptance Criteria
        rollout:
          required: "${meta.service}"
          title: Rollout

  adr:
    idPrefix: ADR
    pathTemplate: "${refs.context.dirPath}/adr/${createdDate}-${slug}.md"
    meta:
      fields:
        context:
          schema:
            type: entityRef
            refTypes: [domain, service, feature]
        decision_status:
          schema:
            type: string
            enum: [proposed, accepted, rejected, superseded]
        impact:
          schema:
            type: string
            enum: [low, medium, high]
        supersedes:
          schema:
            type: entityRef
            refTypes: [adr]
    content:
      sections:
        context:
          title: Context
        decision:
          title: Decision
        alternatives:
          title: Alternatives
        integration-impact:
          required: ${refs.context.type == 'service'}
          title: Integration Impact
        consequences:
          title: Consequences
