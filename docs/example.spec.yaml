version: 0.0.4
description: "Example schema aligned with SPEC_DESC_STANDARD.md and example.file-structure.md"
entity:
  domain:
    id_prefix: DOM
    path_pattern: "spec/domains/{slug}/index.md"
    content:
      sections:
        goal:
          title: Goal

  service:
    id_prefix: SVC
    path_pattern: "{refs.domain.dir_path}/services/{slug}/index.md"
    meta:
      fields:
        domain:
          schema:
            type: entity_ref
            refTypes: [domain]
        tier:
          schema:
            type: string
            enum: [gold, silver, bronze]

  feature:
    id_prefix: FEAT
    path_pattern:
      cases:
        - when: { exists: refs.service }
          use: "{refs.service.dir_path}/features/{meta.status}/{slug}.md"
        - use: "spec/features/{meta.status}/{slug}.md"
    meta:
      fields:
        service:
          schema:
            type: entity_ref
            refTypes: [service]
        owner:
          schema:
            type: string
        status:
          schema:
            type: string
            enum: [draft, testing, actual, deprecated]
        priority:
          schema:
            type: string
            enum: [p0, p1, p2]
        linked_epic:
          schema:
            type: entity_ref
            refTypes: [feature]
        service_tier:
          required_when:
            exists: meta.service
          schema:
            type: string
            enum: [gold, silver, bronze]
        test_file:
          required_when:
            in: [meta.status, [testing, actual]]
          schema:
            type: string
    content:
      sections:
        goal:
          title: Goal
        scope:
          title: Scope
        acceptance:
          title: Acceptance Criteria
        rollout:
          required_when:
            exists: meta.service
          title: Rollout

  adr:
    id_prefix: ADR
    path_pattern: "{refs.context.dir_path}/adr/{created_date}-{slug}.md"
    meta:
      fields:
        context:
          schema:
            type: entity_ref
            refTypes: [domain, service, feature]
        decision_status:
          schema:
            type: string
            enum: [proposed, accepted, rejected, superseded]
        impact:
          schema:
            type: string
            enum: [low, medium, high]
        owner:
          schema:
            type: string
        supersedes:
          schema:
            type: entity_ref
            refTypes: [adr]
    content:
      sections:
        context:
          title: Context
        decision:
          title: Decision
        alternatives:
          title: Alternatives
        integration-impact:
          required_when:
            eq?: [refs.context.type, "service"]
          title: Integration Impact
        consequences:
          title: Consequences
